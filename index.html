<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Alerta Comunal Resolutor</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div class="brand">
        <img src="logo.svg" alt="Alerta Comunal" />
        <div>
          <strong>Alerta Comunal</strong>
          <span>Resolutor</span>
        </div>
      </div>
      <button id="btnSettings" class="ghost hidden" type="button">⚙️</button>
    </header>

    <main>
      <section id="loginView" class="card login-card">
        <h1>Ingreso Resolutor</h1>
        <p>Ingresa con el teléfono registrado por la central municipal.</p>
        <label>Teléfono</label>
        <input id="phoneInput" type="tel" placeholder="+569XXXXXXXX" autocomplete="tel" />
        <button id="btnLogin" class="primary" type="button">Ingresar</button>
        <p id="loginMsg" class="msg"></p>
      </section>

      <section id="mainView" class="hidden">
        <section class="status-card">
          <div>
            <span class="eyebrow">Resolutor</span>
            <h2 id="resolverName">—</h2>
            <p id="resolverCenter">—</p>
          </div>
          <div id="statusPill" class="status-pill offline">OFFLINE</div>
        </section>

        <section class="controls-grid">
          <button id="btnAvailable" class="control available" type="button">Disponible</button>
          <button id="btnBusy" class="control busy" type="button">Ocupado / Pausa</button>
          <button id="btnOffline" class="control offline" type="button">Salir de turno</button>
        </section>

        <section id="reconcileBox" class="notice hidden">
          <strong>Estado corregido</strong>
          <p>El sistema detectó que estabas marcado como ocupado/en sitio sin caso activo. Se sincronizó tu estado.</p>
        </section>

        <section class="card compact">
          <div class="row between">
            <div>
              <span class="eyebrow">Ubicación</span>
              <p id="gpsText">Sin ubicación reportada</p>
            </div>
            <button id="btnUpdateGps" class="secondary small" type="button">Actualizar GPS</button>
          </div>
        </section>

        <section class="tabs">
          <button class="tab active" data-tab="assigned" type="button">Mis casos <span id="assignedCount">0</span></button>
          <button class="tab" data-tab="available" type="button">Disponibles <span id="availableCount">0</span></button>
        </section>

        <section id="ticketsList" class="tickets-list"></section>
      </section>
    </main>
  </div>

  <div id="ticketModal" class="modal hidden">
    <div class="modal-card">
      <button id="btnCloseModal" class="modal-close" type="button">×</button>
      <div id="modalContent"></div>
      <div id="ticketMap" class="ticket-map hidden"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
